<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chess - fun and simple online chess</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <main>
        <div class="hero">
            <h1 class="title"><img src="logo.png"></h1>
        </div>
        <div class="buttons">
            <button id="play-btn" class="btn btn-primary">
                <span>Play</span>
            </button>
            <button id="settings-btn" class="btn btn-secondary">
                <span>Settings</span>
            </button>
        </div>
        <div id="status" class="status"></div>
    </main>

    <div id="tc-overlay" class="tc-overlay hidden">
        <div class="tc-panel">
            <div class="tc-header">Choose time control</div>
            <div class="tc-grid">
                <button class="tc-btn" data-tc="1+0">
                    <span class="tc-time">1 min</span>
                    <span class="tc-type">Bullet</span>
                </button>
                <button class="tc-btn" data-tc="1+1">
                    <span class="tc-time">1 | 1</span>
                    <span class="tc-type">Bullet</span>
                </button>
                <button class="tc-btn" data-tc="2+1">
                    <span class="tc-time">2 | 1</span>
                    <span class="tc-type">Bullet</span>
                </button>
                <button class="tc-btn" data-tc="3+0">
                    <span class="tc-time">3 min</span>
                    <span class="tc-type">Blitz</span>
                </button>
                <button class="tc-btn" data-tc="3+2">
                    <span class="tc-time">3 | 2</span>
                    <span class="tc-type">Blitz</span>
                </button>
                <button class="tc-btn" data-tc="5+0">
                    <span class="tc-time">5 min</span>
                    <span class="tc-type">Blitz</span>
                </button>
                <button class="tc-btn" data-tc="10+0">
                    <span class="tc-time">10 min</span>
                    <span class="tc-type">Rapid</span>
                </button>
                <button class="tc-btn" data-tc="15+10">
                    <span class="tc-time">15 | 10</span>
                    <span class="tc-type">Rapid</span>
                </button>
                <button class="tc-btn" data-tc="30+0">
                    <span class="tc-time">30 min</span>
                    <span class="tc-type">Classical</span>
                </button>
            </div>
            <button id="tc-cancel" class="btn tc-cancel">Cancel</button>
        </div>
    </div>

    <div id="settings-overlay" class="modal-overlay hidden">
        <div class="settings-panel">
            <div class="settings-header-row">
                <div class="tc-header">Settings</div>
                <button id="settings-close" class="icon-close" aria-label="Close settings"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                        width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="settings-body">
                <div class="settings-section">
                    <label class="settings-label" for="username-input">Username</label>
                    <input id="username-input" class="settings-input" type="text" maxlength="20" placeholder="Enter username">
                </div>

                <div class="settings-pickers-row">
                    <div class="settings-section">
                        <div class="settings-label">Theme</div>
                        <div id="theme-picker" class="option-picker theme-picker"></div>
                    </div>

                    <div class="settings-section">
                        <div class="settings-label">Piece set</div>
                        <div id="piece-picker" class="option-picker piece-picker"></div>
                    </div>
                </div>

                <div class="settings-preview-wrap">
                    <div class="settings-preview-card">
                        <div id="settings-preview-board" class="settings-preview-board"></div>
                    </div>
                </div>
            </div>

            <div class="settings-actions">
                <button id="settings-reset" class="btn settings-reset-btn">Reset</button>
                <div class="settings-actions-right">
                    <button id="settings-cancel" class="btn settings-cancel-btn">Cancel</button>
                    <button id="settings-save" class="btn settings-save-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
