<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chess - fun and simple online chess</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
</head>

<body>
    <div id="game">
        <div id="board-wrap">
            <div class="player-bar" id="player-bar-top">
                <div class="bar-pieces" id="bar-pieces-top"></div>
                <img class="bar-avatar" id="avatar-top" style="display:none;">
                <span class="player-name" id="opponent-name">Opponent</span>
                <div id="clock-top" class="clock">10:00</div>
            </div>
            <div id="board"></div>
            <div class="player-bar" id="player-bar-bottom">
                <div class="bar-pieces" id="bar-pieces-bottom"></div>
                <img class="bar-avatar" id="avatar-bottom" style="display:none;">
                <span class="player-name" id="player-name">Guest</span>
                <div id="clock-bottom" class="clock">10:00</div>
            </div>
        </div>
        <div id="sidebar">
            <div id="move-log"></div>
            <div id="sidebar-actions">
                <button class="action-btn" id="draw-btn">Draw</button>
                <button class="action-btn danger" id="resign-btn">Resign</button>
                <div id="resign-confirm" class="hidden">
                    <span>Resign?</span>
                    <button class="action-btn danger" id="resign-yes">Yes</button>
                    <button class="action-btn" id="resign-no">No</button>
                </div>
            </div>
        </div>
    </div>
    <div id="connection-status" class="hidden">
        <span>Reconnecting</span><span class="dots"></span>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
